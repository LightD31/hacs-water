# =============================================================
# Cumulus Solaire Card — exemples
# =============================================================

# --- Minimal (utilise tous les défauts, panneau réglages repliable) ---
- type: custom:cumulus-solaire-card
  entity: sensor.cumulus_automation


# --- Avec capteur Solcast personnalisé ---
- type: custom:cumulus-solaire-card
  entity: sensor.cumulus_automation
  forecast_entity: sensor.solcast_pv_forecast_previsions_pour_aujourd_hui


# --- Sans panneau réglages (par exemple pour le header) ---
- type: custom:cumulus-solaire-card
  entity: sensor.cumulus_automation
  show_settings: false


# --- Réglages toujours dépliés (carte plus haute) ---
- type: custom:cumulus-solaire-card
  entity: sensor.cumulus_automation
  show_settings: expanded


# --- Avec helpers personnalisés ou contrôles masqués ---
- type: custom:cumulus-solaire-card
  entity: sensor.cumulus_automation
  controls:
    efficiency: false   # masque le slider rendement
    target: input_number.mon_helper_cible_perso

# =============================================================
# Cette carte unique remplace plusieurs blocs de votre dashboard v4 :
#   - bubble-card "Automatisation" + ses sub-buttons
#   - chips de diagnostic
#   - mushroom-template-card "raison de la décision"
#   - bubble-cards des 6 réglages (toggle + 5 sliders)
# =============================================================
